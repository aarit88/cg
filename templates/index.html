<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sketchify Web — Cartoonify Your Images</title>
  <meta name="description" content="Sketchify Web transforms your photos into vibrant cartoon-style artwork using edge-preserving filters and color quantization." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
</head>
<body>

  <!-- Decorative floating orbs -->
  <div class="bg-orbs" aria-hidden="true">
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
  </div>

  <div class="app">

    <header class="topbar">
      <div class="brand">
        <div class="logo" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M12 2l2.4 5h5.3l-4.3 3.1 1.7 5.2L12 13.9 6.9 15.3l1.7-5.2L4.3 7h5.3L12 2z" fill="currentColor"/></svg>
        </div>
        <span>Sketchify Web</span>
        <span class="subtitle">AI Cartoonifier</span>
      </div>

      <div class="toolbar">
        <button id="open-file" class="btn btn-outline" type="button" title="Open (O)">Open</button>
        <div class="spacer"></div>
      </div>
    </header>

    <div class="shell">
      <aside class="rail">
        <div class="rail-block">
          <label class="drop" id="upload-area" tabindex="0" aria-label="Upload image">
            <input id="file-input" type="file" name="file" accept="image/png,image/jpeg,image/webp" />
            <span class="drop-icon" aria-hidden="true">✦</span>
            <span class="drop-text"><strong>Drop</strong> or <u>browse</u></span>
            <span class="muted">JPG, PNG, WEBP • 20MB</span>
          </label>
        </div>
      </aside>

      <main class="canvas">
        <div class="stage" id="stage">
          <!-- floating stage tools -->
          <div class="stage-tools" id="stage-tools" hidden>
            <div class="btn-group">
              <button id="zoom-fit" class="btn btn-quiet" type="button" title="Fit (F)">Fit</button>
              <button id="zoom-out" class="btn btn-quiet icon" type="button" title="Zoom out (–)">−</button>
              <span id="zoom-level" class="zoom-label" aria-live="polite">100%</span>
              <button id="zoom-in" class="btn btn-quiet icon" type="button" title="Zoom in (+)">+</button>
            </div>
            <a id="download-btn" class="btn btn-outline" href="#" download="cartoonified.png" hidden>Download PNG</a>
          </div>

          <div class="stage-inner" id="stage-inner" aria-label="Comparison viewport">
            <img id="img-before" class="img-layer" alt="Original"/>
            <img id="img-after" class="img-layer" alt="Cartoon"/>
            <div id="ba-handle" class="ba-handle" role="slider" aria-valuemin="0" aria-valuemax="100" aria-valuenow="50" tabindex="0">
              <span class="grip"></span>
            </div>
          </div>

          <div id="empty-state" class="empty">
            <div class="empty-illustration" aria-hidden="true"></div>
            <h3>Drop an image to start</h3>
            <p>Or click "Open". Press <kbd>R</kbd> after tweaking settings.</p>
          </div>

          <div id="loader" class="loader" hidden></div>
        </div>

        <div class="bottom-bar" id="bottom-bar" hidden>
          <div class="status" id="status">Ready</div>
        </div>
      </main>

      <aside class="inspector">
        <form id="upload-form" method="post" enctype="multipart/form-data">
          <section class="panel">
            <h3>Processing</h3>
            <div class="grid">
              <label class="field">
                <span>Smoothing</span>
                <select id="blur-type" name="blur_type">
                  <option value="bilateral" selected>Edge-preserving</option>
                  <option value="median">Median</option>
                  <option value="gaussian">Gaussian</option>
                </select>
              </label>

              <label class="field">
                <span>Quantizer</span>
                <select id="quantizer" name="quantizer">
                  <option value="kmeans" selected>K-Means</option>
                  <option value="mediancut">Median Cut</option>
                </select>
              </label>

              <label class="field">
                <span>Colors <b id="label-colors">8</b></span>
                <input type="range" min="4" max="16" value="8" id="num-colors" name="num_colors" />
              </label>

              <label class="field">
                <span>Edge thickness <b id="label-edge">0.5</b></span>
                <input type="range" min="0.1" max="1" step="0.1" value="0.5" id="line-strength" name="line_strength" />
              </label>

              <label class="field">
                <span>Target long side</span>
                <div class="with-suffix">
                  <input id="target-long-side" name="target_long_side" type="number" min="256" max="2048" value="1024"/>
                  <span class="suffix">px</span>
                </div>
              </label>

              <label class="check">
                <input type="checkbox" id="upscale-small" name="upscale_small" checked />
                <span>Smart upscale small images</span>
              </label>
            </div>

            <div class="actions sticky-footer">
              <button type="submit" class="btn btn-primary w-full">✦ Run</button>
            </div>
          </section>

          <section class="panel">
            <h3>Shortcuts</h3>
            <ul class="keys">
              <li><kbd>O</kbd> Open</li>
              <li><kbd>R</kbd> Run</li>
              <li><kbd>F</kbd> Fit</li>
              <li><kbd>+</kbd>/<kbd>−</kbd> Zoom</li>
            </ul>
          </section>
        </form>
      </aside>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
